{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg mt-5">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-lock me-2"></i>Нэвтрэх</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Хэрэглэгчийн нэр</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Нууц үг</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Нэвтрэх
                    </button>
                </form>
                <hr>
                <small class="text-muted">Админ: admin / admin123</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
